name: Feature request
description: Suggest an improvement or new capability for Borg UI.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the workflow or problem first so the request is easier to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is difficult or missing today?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, API, or documentation change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share workarounds or other approaches you have considered.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backups
        - Restores
        - Archives
        - Repositories
        - Schedules
        - Notifications
        - Remote machines
        - Authentication and security
        - Documentation
        - Other
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, examples from other tools, or related links that help explain the request.
    validations:
      required: false
