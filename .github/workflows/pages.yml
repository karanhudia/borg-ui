name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Restore visual reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          rm -rf visual-state
          git init visual-state
          cd visual-state
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin visual-regression-state >/dev/null 2>&1; then
            git fetch --depth=1 origin visual-regression-state
            git checkout -B visual-regression-state FETCH_HEAD
            cd ..
            if [ -d visual-state/visual ]; then
              rm -rf docs/.vitepress/dist/visual
              mkdir -p docs/.vitepress/dist
              cp -R visual-state/visual docs/.vitepress/dist/visual
            fi
          else
            remote_status=$?
            if [ "$remote_status" -eq 2 ]; then
              echo "No visual-regression-state branch found; skipping visual report restore."
            else
              exit "$remote_status"
            fi
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
