name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Verify Borg installation
        run: |
          borg --version
          which borg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test directories
        run: |
          mkdir -p /tmp/borg-ui-tests
          mkdir -p data
          mkdir -p logs

      - name: Run backend coverage suite
        run: |
          pytest \
            tests/unit \
            tests/integration/test_api_archives_integration.py \
            tests/integration/test_api_backup_integration.py \
            tests/integration/test_api_mounts_integration.py \
            tests/integration/test_backup_workflows_integration.py \
            tests/integration/test_api_repositories_integration.py \
            tests/integration/test_api_restore_integration.py \
            tests/integration/test_api_schedule_integration.py \
            tests/integration/test_multi_repo_schedule.py \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-backend
          path: htmlcov/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 70
          MINIMUM_ORANGE: 50

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check locale key parity
        working-directory: frontend
        run: npm run check:locales

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

      - name: Prettier format check
        working-directory: frontend
        run: npm run format:check

      - name: Run linter
        working-directory: frontend
        run: npm run lint

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check build output
        working-directory: frontend
        run: |
          if [ -d "dist" ]; then
            echo "Build successful - dist directory created"
            ls -lah dist/ | head -20
          elif [ -d "build" ]; then
            echo "Build successful - build directory created"
            ls -lah build/ | head -20
          else
            echo "Build directory not found"
            ls -lah
            exit 1
          fi

  test-results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-quality, frontend-tests, frontend-build]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Backend coverage: ${{ needs.backend-coverage.result }}"
          echo "Frontend quality: ${{ needs.frontend-quality.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          echo "Frontend build: ${{ needs.frontend-build.result }}"

          if [ "${{ needs.backend-coverage.result }}" != "success" ]; then
            echo "Backend coverage failed"
            exit 1
          fi

          if [ "${{ needs.frontend-quality.result }}" != "success" ]; then
            echo "Frontend quality failed"
            exit 1
          fi

          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "Frontend tests failed"
            exit 1
          fi

          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "Frontend build failed"
            exit 1
          fi

          echo "All blocking test lanes passed"
