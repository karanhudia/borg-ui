name: Argos Visual Regression

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/.storybook/**"
      - "frontend/scripts/**"
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/argos-visual-regression.yml"
  push:
    branches: [main]
    paths:
      - "frontend/.storybook/**"
      - "frontend/scripts/**"
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/argos-visual-regression.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  argos:
    name: Argos / Storybook Snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Capture and upload Storybook snapshots
        working-directory: frontend
        run: npm run argos:ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
