name: Smoke Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SMOKE_URL: "http://localhost:8082"

jobs:
  smoke-core:
    name: Smoke Core
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend build to static directory
        run: |
          mkdir -p app/static
          cp -r frontend/build/* app/static/

      - name: Create smoke test data
        run: |
          chmod +x tests/setup_test_env.sh
          ./tests/setup_test_env.sh

      - name: Start Borg UI backend
        run: |
          mkdir -p data logs
          uvicorn app.main:app --host 0.0.0.0 --port 8082 &
          echo $! > /tmp/borg-ui.pid
        env:
          DATA_DIR: ${{ github.workspace }}/data
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///${{ github.workspace }}/data/test.db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Wait for service to be ready
        run: |
          timeout 60 bash -c 'until curl -s ${{ env.SMOKE_URL }}/api/docs > /dev/null; do sleep 2; done'

      - name: Run core smoke suite
        run: |
          python3 tests/smoke/run_core_smoke.py --url ${{ env.SMOKE_URL }}
        env:
          BORG_UI_CONTAINER: false

      - name: Stop Borg UI
        if: always()
        run: |
          if [ -f /tmp/borg-ui.pid ]; then
            kill "$(cat /tmp/borg-ui.pid)" || true
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-core-artifacts
          path: |
            /tmp/borg-ui-tests/TEST_INFO.txt
            logs/
          retention-days: 7

  smoke-extended:
    name: Smoke Extended
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y borgbackup

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend build to static directory
        run: |
          mkdir -p app/static
          cp -r frontend/build/* app/static/

      - name: Create smoke test data
        run: |
          chmod +x tests/setup_test_env.sh
          ./tests/setup_test_env.sh

      - name: Start Borg UI backend
        run: |
          mkdir -p data logs
          uvicorn app.main:app --host 0.0.0.0 --port 8082 &
          echo $! > /tmp/borg-ui.pid
        env:
          DATA_DIR: ${{ github.workspace }}/data
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///${{ github.workspace }}/data/test.db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Wait for service to be ready
        run: |
          timeout 60 bash -c 'until curl -s ${{ env.SMOKE_URL }}/api/docs > /dev/null; do sleep 2; done'

      - name: Run extended smoke suite
        run: |
          python3 tests/smoke/run_extended_smoke.py --url ${{ env.SMOKE_URL }}
        env:
          BORG_UI_CONTAINER: false

      - name: Stop Borg UI
        if: always()
        run: |
          if [ -f /tmp/borg-ui.pid ]; then
            kill "$(cat /tmp/borg-ui.pid)" || true
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-extended-artifacts
          path: |
            /tmp/borg-ui-tests/TEST_INFO.txt
            logs/
          retention-days: 7
