default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-format
        name: backend-ruff-format
        files: ^(app|tests)/.*\.py$
        stages: [pre-commit]
      - id: ruff
        name: backend-ruff-fix
        args: [--fix]
        files: ^(app|tests)/.*\.py$
        stages: [pre-commit]
      - id: ruff
        name: backend-ruff-check
        args: [app, tests]
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-format
        name: backend-ruff-format-check
        args: [--check, app, tests]
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: frontend-prettier-write
        name: frontend-prettier-write
        entry: npm --prefix frontend exec -- prettier --write
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|json|css|md)$
        pass_filenames: true
        stages: [pre-commit]
      - id: frontend-format-check
        name: frontend-format-check
        entry: npm --prefix frontend run format:check
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-locale-check
        name: frontend-locale-check
        entry: npm --prefix frontend run check:locales
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: npm --prefix frontend run typecheck
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-lint
        name: frontend-lint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        stages: [pre-push]
